<!DOCTYPE html>
<html>
<head>
    <title>Developer Portfolio Generator</title>
    <link rel="stylesheet" href="style.css">

    <!-- Markdown Library -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body class="light">

<div class="container">

    <h1>🚀 Developer Portfolio Generator</h1>

    <textarea id="markdownInput" placeholder="Paste your markdown here..."></textarea>

    <br>

    <button class="generate-btn" onclick="generatePortfolio()">Generate Portfolio</button>
    <button class="light-btn" onclick="setTheme('light')">Light Theme</button>
    <button class="dark-btn" onclick="setTheme('dark')">Dark Theme</button>

    <div id="preview"></div>

</div>

<script src="script.js"></script>

<!-- Success Popup -->
<div id="popup" class="popup">
    ✅ Portfolio Generated Successfully!
</div>


</body>
</html>
